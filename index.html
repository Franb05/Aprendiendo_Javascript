<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Enlace Javascript -->
    <script src="JS/javascript.js"></script>
  </head>
  <body>
    <!-- Script solo escrito para la pantalla de desarrolladores -->
    <script>
      console.log("Oso enojado");

      // Declarando variables utilizando la palabra let y mostrandola por consola a traves de console log
      let firstName = "Franco";
      let lastName = "Brasa";

      console.log(firstName);
      console.log(lastName);

      //Tambien se pueden reasignar variables
      let age = 11;
      console.log(age);

      age = 54;

      console.log(age);

      //Tambien podemos definir constantes, para que el valor no cambie nunca, en vez de cambiar por 10,
      //nos dara un error, y nos dira en que linea fallo para poder revisarlo y modificarlo
      const pi = 3.14;
      pi = 10;

      console.log(pi);
    </script>
  </body>
</html>
