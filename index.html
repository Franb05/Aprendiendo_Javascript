<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Enlace Javascript -->
    <script src="JS/javascript.js"></script>
  </head>
  <body>
    <!-- Script solo escrito para la pantalla de desarrolladores -->
    <script>
      console.log("Oso enojado");

      // Declarando variables utilizando la palabra let y mostrandola por consola a traves de console log
      let firstName = "Franco";
      let lastName = "Brasa";

      console.log(firstName);
      console.log(lastName);

      //Tambien se pueden reasignar variables
      let age = 11;
      console.log(age);

      age = 54;

      console.log(age);

      //Tambien podemos definir constantes, para que el valor no cambie nunca, en vez de cambiar por 10,
      //nos dara un error, y nos dira en que linea fallo para poder revisarlo y modificarlo
      const pi = 3.14;

      console.log(pi);

      //Utilicemos Suma, Resta, Multiplicacion y division
      console.log(10 + 20); //Por consola deberia mostrar el numero 30

      console.log(2 + 4 + 6 + 8 + 10 + 12); //Por consola deberia mostrar el numero 42

      console.log((3 + 3) * 5); //Multiplicacion, por consola deberia mostrar 30

      console.log((10 + 20) / 5); //Division, por consola deberia mostrar 6

      //Utilizaremos mas variables y constantes con numeros y funciones
      let a = 10;
      console.log(a); //Mostrara por consola 10
      a = 50;
      console.log(a); //Mostrara por consola 50

      let b = a * 7;
      console.log(b); //Mostrara por consola 350

      const MAX = 50;
      const ACTUAL = MAX - 13;
      const PERCERNTAGE = ACTUAL / MAX;

      console.log(PERCERNTAGE);
    </script>
  </body>
</html>
